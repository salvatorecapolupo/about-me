<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salvatore Capolupo (Roma)</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.6.0/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f4f4f4;
      color: #333;
      font-family: 'Arial', sans-serif;
    }
    h1 {
      text-align: center;
      font-size: 3em;
      font-weight: bold;
      margin-top: 30px;
    }
    table th, table td {
      text-align: center;
    }
    .table-responsive {
      margin-top: 30px;
    }
    .table-hover tbody tr:hover {
      background-color: #f1f1f1;
    }
    .repo-link {
      color: #007bff;
    }
    .repo-link:hover {
      color: #0056b3;
    }
    .repo-description {
      font-size: 0.9em;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Indice Repository - Salvatore Capolupo</h1>
    
    <div class="table-responsive">
      <table class="table table-bordered table-striped table-sm table-hover">
        <thead class="thead-dark">
          <tr>
            <th>Repository</th>
            <th>Descrizione</th>
            <th>Link</th>
          </tr>
        </thead>
        <tbody id="repoTable">
          <!-- I repository verranno aggiunti qui dinamicamente -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Eseguiamo una simulazione dei repository (simuliamo la risposta da GitHub)
    const repositories = [
    { name: "All You Need Is Python ", description: "", url: "https://salvatorecapolupo.github.io/allyouneedispython /" },
    { name: "Crittografia", description: "", url: "https://salvatorecapolupo.github.io/crittografia/" },
    { name: "Didattica", description: "", url: "https://salvatorecapolupo.github.io/didattica/" },
    { name: "Dispense Scuola", description: "", url: "https://salvatorecapolupo.github.io/scuola/" },
    { name: "emu8086", description: "", url: "https://salvatorecapolupo.github.io/emu8086/" },
    { name: "Er Converter", description: "", url: "https://salvatorecapolupo.github.io/erconverter/" },
    { name: "Insegnare Informatica", description: "", url: "https://salvatorecapolupo.github.io/insegnareinformatica/" },
    { name: "IPv4", description: "", url: "https://salvatorecapolupo.github.io/surviving-ipv4/" },
    { name: "Insuperato", description: "", url: "https://salvatorecapolupo.github.io/insuperato/" },
    { name: "Materiale Didattico (Informatica, TPSIT, Sistemi, GPO, ...)", description: "", url: "https://salvatorecapolupo.github.io/informatica/" },
    { name: "Network Speed Game", description: "", url: "https://salvatorecapolupo.github.io/network-speed-game/" },
    { name: "Privacy", description: "", url: "https://salvatorecapolupo.github.io/privacy/" },
    { name: "Problemi di programmazione", description: "", url: "https://salvatorecapolupo.github.io/problemi_di_programmazione/" },
    { name: "Prolog ", description: "", url: "https://salvatorecapolupo.github.io/prolog/" },
    { name: "Puzzle Code ", description: "", url: "https://salvatorecapolupo.github.io/puzzlecode/" },
    { name: "Routing ", description: "", url: "https://salvatorecapolupo.github.io/routing1/" },
    { name: "Standard RFC 862", description: "", url: "https://salvatorecapolupo.github.io/rfc862/" },
    { name: "TCP vs. UDP", description: "", url: "https://salvatorecapolupo.github.io/tcpudp/" },
    { name: "Virgola Mobile", description: "", url: "https://salvatorecapolupo.github.io/virgolamobile/" },
    { name: "ZIUQ", description: "", url: "https://salvatorecapolupo.github.io/ziuq/open-ended.html" },
    ];

    function generateRepoTable(repos) {
      const tableBody = document.getElementById('repoTable');
      repos.forEach(repo => {
        const row = document.createElement('tr');
        
        row.innerHTML = `
          <td>${repo.name}</td>
          <td class="repo-description">${repo.description}</td>
          <td><a href="${repo.url}" class="repo-link" target="_blank">Visita Repository</a></td>
        `;
        
        tableBody.appendChild(row);
      });
    }

    // Carica i dati dei repository
    generateRepoTable(repositories);
  </script>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.6.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
